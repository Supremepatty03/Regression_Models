<!DOCTYPE html>
<html lang="ru">
<head>          
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="../css/Auth.css">
</head>
<body>      
    
    <div class="Auth-container">

        <h2>Авторизация</h2>

        <form action="/api/Account/Login" method="post">

            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>

            <button type="button" id="loginBtn"> <!--type=submit Поменять обратно при реализации бэка: <button type="submit">Войти</button> (это все что было) -->
                Войти
            </button>

            <p id = "errorMessage" style="color: red; display: none;"></p>

        </form>
        <p>
            Нет аккаунта? 
            <a href="Registration.html">Зарегистрироваться</a>
        </p>
    </div>  
    
    <script src="../js/Auth.js"></script>
</body>
</html>
