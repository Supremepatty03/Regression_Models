<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="../css/Registration.css">
</head>
<body>
    <div class = "Registration-container">
        <h2>Регистрация</h2>
        <form action="/api/Account/Register" method="post">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Электронная почта:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>

            <button type="button" onclick="window.location.href='Dashboard.html'"> <!--type=submit Поменять обратно при реализации бэка: <button type="submit">Войти</button> (это все что было) -->
                Войти
            </button>
        </form>

        <p>
            Уже есть аккаунт? 
            <a href="Auth.html">Войти</a>
        </p>

    </div>
</body>
</html>
