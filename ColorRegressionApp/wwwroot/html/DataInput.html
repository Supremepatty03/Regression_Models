<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод данных</title>
    <link rel="stylesheet" href="../css/DataInput.css">
</head>
<body>
    <div class="container">

        <h2>Ввод экспериментальных данных</h2>

        <p>Введите параметры рецептуры и соответствующие значения L, a, b</p>

        <table>
            <thead>
                <tr>
                    <th>№</th>
                    <th>Концентрация красителя (X1)</th>
                    <th>Температура (X2)</th>
                    <th>Время (X3)</th>
                    <th>L</th>
                    <th>a</th>
                    <th>b</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                </tr>

                <tr>
                    <td>2</td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                </tr>

                <tr>
                    <td>3</td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number" step="0.1"></td>
                </tr>
            </tbody>
        </table>

        <p id="errorMsg" style="color: red; display: none; margin-top: 10px;"></p>    

        <div class="buttons">
            <button type = "button" id="buildModelBtn">
                Построить модель
            </button>

            <button type = "button" onclick="window.location.href='Dashboard.html'">
                Назад
            </button>
        </div>


    </div>
    <script src="../js/DataInput.js"></script>
    <script src="../js/Theme.js"></script>
</body>
</html>
