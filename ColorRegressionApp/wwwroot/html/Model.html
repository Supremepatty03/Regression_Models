<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модель</title>
    <link rel="stylesheet" href="../css/Model.css">
</head>
<body>

<div class="container">

    <h2 id="modelTitle">Результаты построения модели</h2>

    <p>
        На основе введённых данных построены регрессионные модели
        для координат цвета L, a, b.
    </p>

    <div class="formulas">
        <h3>Модель для L</h3>
        <p id="formulaL"></p>

        <h3>Модель для a</h3>
        <p id="formulaA"></p>

        <h3>Модель для b</h3>
        <p id="formulaB"></p>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Коэффициент</th>
                    <th>L</th>
                    <th>a</th>
                    <th>b</th>
                </tr>
            </thead>
            <tbody id="coefficientsBody"></tbody>
        </table>
    </div>

    <div class="chart-card">
        <h3>Сравнение: реальное vs модель (L)</h3>
        <div class="chart-box">
            <canvas id="lChart"></canvas>
        </div>
    </div>

    <div class="table-wrapper" style="margin-top: 20px;">
        <table>
            <thead>
                <tr>
                    <th>Точка</th>
                    <th>L факт</th>
                    <th>L модель</th>
                    <th>Ошибка</th>
                </tr>
            </thead>
            <tbody id="comparisonBody"></tbody>
        </table>
    </div>

    <div class="buttons">
        <button type="button" id="goPredictionBtn">Перейти к прогнозу</button>
        <button type="button" onclick="window.location.href='DataInput.html'">Назад</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/Model.js"></script>
<script src="../js/Theme.js"></script>
</body>
</html>
